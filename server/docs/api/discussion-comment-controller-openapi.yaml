openapi: 3.0.3
info:
  title: Dialog Discussion Comment API
  description: 토론 댓글 및 대댓글 관리를 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: Discussion Comment
    description: 토론 댓글 관리

paths:
  /api/discussions/comments:
    post:
      tags:
        - Discussion Comment
      summary: 댓글 또는 대댓글 생성
      description: |
        토론에 댓글을 작성하거나, 기존 댓글에 대댓글을 작성합니다.

        **댓글 작성:** `parentDiscussionCommentId`를 null로 설정
        **대댓글 작성:** `parentDiscussionCommentId`에 부모 댓글 ID 설정
      operationId: createComment
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/comment.yaml#/components/schemas/DiscussionCommentCreateRequest'
            examples:
              comment:
                summary: 댓글 작성
                value:
                  content: "좋은 의견입니다!"
                  discussionId: 123
                  parentDiscussionCommentId: null
              reply:
                summary: 대댓글 작성
                value:
                  content: "동의합니다."
                  discussionId: 123
                  parentDiscussionCommentId: 456
      responses:
        '200':
          description: 댓글 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/comment.yaml#/components/schemas/DiscussionCommentCreateResponse'
              example:
                data:
                  id: 789
        'error-codes':
          description: "[1005, 5022, 5060]"
        '400':
          description: 잘못된 요청 (유효성 검증 실패)
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              examples:
                emptyContent:
                  summary: 내용이 비어있음
                  value:
                    code: 4000
                    message: "댓글 내용은 필수 입력값입니다."
                invalidDiscussionId:
                  summary: 토론 ID가 null
                  value:
                    code: 4000
                    message: "토론 ID는 필수 입력값입니다."
        '401':
          $ref: './components/responses/global.yaml#/components/responses/Unauthorized'
        '404':
          description: 토론 또는 부모 댓글을 찾을 수 없습니다
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
        '500':
          $ref: './components/responses/global.yaml#/components/responses/InternalServerError'

  /api/discussions/comments/{discussionCommentId}:
    patch:
      tags:
        - Discussion Comment
      summary: 댓글 수정
      description: 기존 댓글의 내용을 수정합니다. 작성자만 수정할 수 있습니다.
      operationId: updateComment
      security:
        - sessionAuth: []
      parameters:
        - name: discussionCommentId
          in: path
          required: true
          description: 수정할 댓글 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/comment.yaml#/components/schemas/DiscussionCommentUpdateRequest'
            example:
              content: "수정된 댓글 내용입니다."
      responses:
        '200':
          description: 댓글 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5060, 5062]"
        '400':
          description: 잘못된 요청 (유효성 검증 실패)
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4000
                message: "댓글 내용은 필수 입력값입니다."
        '401':
          $ref: './components/responses/global.yaml#/components/responses/Unauthorized'
        '403':
          description: 권한 없음 (작성자만 수정 가능)
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4030
                message: "댓글을 수정할 권한이 없습니다."
        '404':
          description: 댓글을 찾을 수 없습니다
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4040
                message: "댓글을 찾을 수 없습니다."
        '500':
          $ref: './components/responses/global.yaml#/components/responses/InternalServerError'

    delete:
      tags:
        - Discussion Comment
      summary: 댓글 삭제
      description: 댓글을 삭제합니다. 작성자만 삭제할 수 있습니다.
      operationId: deleteComment
      security:
        - sessionAuth: []
      parameters:
        - name: discussionCommentId
          in: path
          required: true
          description: 삭제할 댓글 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 댓글 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5060, 5062]"
        '401':
          $ref: './components/responses/global.yaml#/components/responses/Unauthorized'
        '403':
          description: 권한 없음 (작성자만 삭제 가능)
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4030
                message: "댓글을 삭제할 권한이 없습니다."
        '404':
          description: 댓글을 찾을 수 없습니다
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4040
                message: "댓글을 찾을 수 없습니다."
        '500':
          $ref: './components/responses/global.yaml#/components/responses/InternalServerError'

  /api/discussions/{discussionId}/comments:
    get:
      tags:
        - Discussion Comment
      summary: 토론의 댓글 목록 조회
      description: |
        특정 토론의 모든 댓글과 대댓글을 조회합니다.

        **응답 구조:**
        - 최상위 댓글들이 반환됩니다
        - 각 댓글은 `childComments` 배열에 대댓글을 포함합니다
        - 계층 구조로 조회됩니다
      operationId: getComments
      parameters:
        - name: discussionId
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 댓글 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/comment.yaml#/components/schemas/DiscussionCommentListResponse'
              example:
                data:
                  comments:
                    - id: 1
                      content: "좋은 의견입니다!"
                      createdAt: "2025-11-13T10:30:00"
                      isDeleted: false
                      author:
                        id: 123
                        nickname: "홍길동"
                        track: "BACKEND"
                      profileImage:
                        customImageUri: "https://s3.amazonaws.com/dialog/profiles/user123.jpg"
                        basicImageUri: "https://avatars.githubusercontent.com/u/12345"
                      childComments:
                        - id: 2
                          content: "동의합니다."
                          createdAt: "2025-11-13T10:35:00"
                          isDeleted: false
                          author:
                            id: 456
                            nickname: "김철수"
                            track: "FRONTEND"
                          profileImage:
                            customImageUri: null
                            basicImageUri: "https://avatars.githubusercontent.com/u/67890"
                          childComments: []
        'error-codes':
          description: "[5022]"
        '404':
          description: 토론을 찾을 수 없습니다
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4040
                message: "토론을 찾을 수 없습니다."
        '500':
          $ref: './components/responses/global.yaml#/components/responses/InternalServerError'

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'
