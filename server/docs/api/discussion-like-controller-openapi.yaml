openapi: 3.0.3
info:
  title: Dialog Discussion Like API
  description: 토론 좋아요 기능 관리를 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: Discussion Like
    description: 토론 좋아요 관리

paths:
  /api/discussions/{discussionsId}/likes:
    post:
      tags:
        - Discussion Like
      summary: 좋아요 추가
      description: 특정 토론에 좋아요를 추가합니다. 이미 좋아요가 되어있으면 중복되지 않습니다.
      operationId: addLike
      security:
        - sessionAuth: []
      parameters:
        - name: discussionsId
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 좋아요 추가 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5022]"
        '401':
          $ref: './components/responses/global.yaml#/components/responses/Unauthorized'
        '404':
          description: 토론을 찾을 수 없습니다
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4040
                message: "토론을 찾을 수 없습니다."
        '500':
          $ref: './components/responses/global.yaml#/components/responses/InternalServerError'

    delete:
      tags:
        - Discussion Like
      summary: 좋아요 취소
      description: 특정 토론의 좋아요를 취소합니다.
      operationId: removeLike
      security:
        - sessionAuth: []
      parameters:
        - name: discussionsId
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 좋아요 취소 성공 (응답 본문 없음)
        'error-codes':
          description: "[1005, 5022]"
        '401':
          $ref: './components/responses/global.yaml#/components/responses/Unauthorized'
        '404':
          description: 토론 또는 좋아요를 찾을 수 없습니다
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4040
                message: "좋아요를 찾을 수 없습니다."
        '500':
          $ref: './components/responses/global.yaml#/components/responses/InternalServerError'

  /api/discussions/{discussionsId}/likes/status:
    get:
      tags:
        - Discussion Like
      summary: 좋아요 상태 조회
      description: 현재 사용자가 해당 토론에 좋아요를 눌렀는지 확인합니다.
      operationId: getLikeStatus
      security:
        - sessionAuth: []
      parameters:
        - name: discussionsId
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 좋아요 상태 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/like.yaml#/components/schemas/LikeStatusResponse'
              examples:
                liked:
                  summary: 좋아요를 누른 상태
                  value:
                    data:
                      isLiked: true
                notLiked:
                  summary: 좋아요를 누르지 않은 상태
                  value:
                    data:
                      isLiked: false
        'error-codes':
          description: "[1005, 5022]"
        '401':
          $ref: './components/responses/global.yaml#/components/responses/Unauthorized'
        '404':
          description: 토론을 찾을 수 없습니다
          content:
            application/json:
              schema:
                $ref: './components/schemas/global.yaml#/components/schemas/ErrorResponse'
              example:
                code: 4040
                message: "토론을 찾을 수 없습니다."
        '500':
          $ref: './components/responses/global.yaml#/components/responses/InternalServerError'

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'
