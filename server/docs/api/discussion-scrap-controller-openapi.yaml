openapi: 3.0.3
info:
  title: Dialog Discussion Scrap API
  description: 토론 북마크(스크랩) 기능 관리를 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: Discussion Scrap
    description: 토론 북마크 관리

paths:
  /api/discussions/{discussionId}/scraps:
    post:
      tags:
        - Discussion Scrap
      summary: 북마크 추가
      description: 특정 토론을 북마크에 추가합니다. 이미 북마크가 되어있으면 중복되지 않습니다.
      operationId: addScrap
      security:
        - sessionAuth: []
      parameters:
        - name: discussionId
          in: path
          required: true
          description: 북마크할 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: 북마크 추가 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5022]"

    delete:
      tags:
        - Discussion Scrap
      summary: 북마크 제거
      description: 특정 토론을 북마크에서 제거합니다.
      operationId: removeScrap
      security:
        - sessionAuth: []
      parameters:
        - name: discussionId
          in: path
          required: true
          description: 북마크 제거할 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 북마크 제거 성공 (응답 본문 없음)
        'error-codes':
          description: "[1005, 5022]"

  /api/discussions/{discussionId}/scraps/status:
    get:
      tags:
        - Discussion Scrap
      summary: 북마크 상태 조회
      description: 현재 사용자가 해당 토론을 북마크했는지 확인합니다.
      operationId: getScrapStatus
      security:
        - sessionAuth: []
      parameters:
        - name: discussionId
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 북마크 상태 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/scrap.yaml#/components/schemas/ScrapStatusResponse'
              examples:
                scraped:
                  summary: 북마크에 추가된 상태
                  value:
                    data:
                      isScraped: true
                notScraped:
                  summary: 북마크에 추가되지 않은 상태
                  value:
                    data:
                      isScraped: false
        'error-codes':
          description: "[1005, 5022]"

  /api/scraps/me:
    get:
      tags:
        - Discussion Scrap
      summary: 내 북마크 목록 조회
      description: |
        로그인한 사용자가 북마크한 토론 목록을 조회합니다.

        **페이지네이션:**
        - 커서 기반 페이지네이션 사용
        - 커서는 토론 ID (Long) 사용
        - 기본 페이지 크기: 10
      operationId: getMyScrapsList
      security:
        - sessionAuth: []
      parameters:
        - name: lastCursorId
          in: query
          required: false
          description: 마지막으로 조회한 토론 ID (다음 페이지 조회 시 사용)
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          description: 페이지 크기
          schema:
            type: integer
            default: 10
            example: 10
      responses:
        '200':
          description: 북마크 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/scrap.yaml#/components/schemas/ScrapCursorPageResponse'
              example:
                data:
                  content:
                    - id: 123
                      title: "백엔드 아키텍처 토론"
                      status: "ACTIVE"
                      category: "BACKEND"
                      discussionType: "OFFLINE"
                      likeCount: 15
                      commentCount: 8
                      scrapCount: 5
                      viewCount: 120
                      createdAt: "2025-11-13T10:00:00"
                      author:
                        id: 456
                        nickname: "홍길동"
                        track: "BACKEND"
                      profileImage:
                        customImageUri: "https://s3.amazonaws.com/dialog/profiles/user456.jpg"
                        basicImageUri: "https://avatars.githubusercontent.com/u/12345"
                  nextCursorId: 78
                  hasNext: true
                  size: 10
        'error-codes':
          description: "[1005]"

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'
