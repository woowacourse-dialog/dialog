spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${DEVELOP_DB_URL}
    username: ${DEVELOP_DB_USERNAME}
    password: ${DEVELOP_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: true
    open-in-view: false

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_OAUTH_CLIENT_ID}
            client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}
            redirect-uri: ${OAUTH_REDIRECT_URI}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000
apple:
  oauth2:
    allowed-audiences: ${APPLE_ALLOWED_AUDIENCES}
    default-profile-image-url: ${APPLE_DEFAULT_PROFILE_IMAGE_URL:/images/default-profile.png}

server:
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT_MINUTE}

app:
  frontend:
    url: ${FRONTEND_URL}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET_NAME}
  region: ${AWS_REGION}
  credentials:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

firebase:
  config:
    path: ${FIREBASE_CONFIG_PATH}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth API
        url: /docs/api/auth-controller-openapi.yaml
      - name: Discussion API
        url: /docs/api/discussion-controller-openapi.yaml
      - name: Discussion Comment API
        url: /docs/api/discussion-comment-controller-openapi.yaml
      - name: Discussion Like API
        url: /docs/api/discussion-like-controller-openapi.yaml
      - name: Discussion Participant API
        url: /docs/api/discussion-participant-controller-openapi.yaml
      - name: Discussion Scrap API
        url: /docs/api/discussion-scrap-controller-openapi.yaml
      - name: Firebase Token API
        url: /docs/api/firebase-token-controller-openapi.yaml
      - name: User API
        url: /docs/api/user-controller-openapi.yaml
    urls-primary-name: Discussion API
