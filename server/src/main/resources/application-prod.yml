spring:
  config:
    activate:
      # 운영 환경
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_OAUTH_CLIENT_ID}
            client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}
            redirect-uri: ${OAUTH_REDIRECT_URI}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000

apple:
  oauth2:
    allowed-audiences: ${APPLE_ALLOWED_AUDIENCES}
    default-profile-image-url: ${APPLE_DEFAULT_PROFILE_IMAGE_URL:/images/default-profile.png}

app:
  frontend:
    url: ${FRONTEND_URL}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET_NAME}
  region: ${AWS_REGION}
  credentials:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

firebase:
  config:
    path: ${FIREBASE_CONFIG_PATH}


server:
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth API
        url: /docs/api/auth-controller-openapi.yaml
      - name: Mobile Auth API
        url: /docs/api/mobile-auth-controller-openapi.yaml
      - name: Discussion API
        url: /docs/api/discussion-controller-openapi.yaml
      - name: Discussion Comment API
        url: /docs/api/discussion-comment-controller-openapi.yaml
      - name: Discussion Like API
        url: /docs/api/discussion-like-controller-openapi.yaml
      - name: Discussion Participant API
        url: /docs/api/discussion-participant-controller-openapi.yaml
      - name: Discussion Scrap API
        url: /docs/api/discussion-scrap-controller-openapi.yaml
      - name: Firebase Token API
        url: /docs/api/firebase-token-controller-openapi.yaml
      - name: User API
        url: /docs/api/user-controller-openapi.yaml
    urls-primary-name: Discussion API
