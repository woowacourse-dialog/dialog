openapi: 3.0.3
info:
  title: Global Responses
  description: 전역으로 공유되는 공통 응답 정의
  version: 1.0.0

components:
  responses:
    Unauthorized:
      description: 인증되지 않은 요청
      content:
        application/json:
          schema:
            $ref: '../schemas/global.yaml#/components/schemas/ErrorResponse'
          example:
            code: 4010
            message: "인증이 필요합니다."

    BadRequest:
      description: 잘못된 요청 (유효성 검증 실패)
      content:
        application/json:
          schema:
            $ref: '../schemas/global.yaml#/components/schemas/ErrorResponse'
          example:
            code: 4000
            message: "잘못된 요청입니다."

    NotFound:
      description: 리소스를 찾을 수 없습니다
      content:
        application/json:
          schema:
            $ref: '../schemas/global.yaml#/components/schemas/ErrorResponse'
          example:
            code: 4040
            message: "리소스를 찾을 수 없습니다."

    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '../schemas/global.yaml#/components/schemas/ErrorResponse'
          example:
            code: 5000
            message: "서버 내부 오류가 발생했습니다."
