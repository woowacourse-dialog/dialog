openapi: 3.0.3
info:
  title: Dialog Discussion API
  description: 토론 생성, 조회, 수정, 삭제 및 검색을 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: Discussion
    description: 토론 관리

paths:
  /api/discussions/offline:
    post:
      tags:
        - Discussion
      summary: 오프라인 토론 생성
      description: 오프라인(대면) 토론을 생성합니다. 시작/종료 시간, 장소, 최대 참가자 수를 지정할 수 있습니다.
      operationId: createOfflineDiscussion
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/discussion.yaml#/components/schemas/OfflineDiscussionCreateRequest'
            example:
              title: "백엔드 아키텍처 토론"
              content: "마이크로서비스 아키텍처에 대해 논의합니다."
              startAt: "2025-11-20T14:00:00"
              endAt: "2025-11-20T16:00:00"
              place: "강남역 스터디룸"
              maxParticipantCount: 10
              category: "BACKEND"
              summary: null
      responses:
        '201':
          description: 토론 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionCreateResponse'
              example:
                data:
                  discussionId: 456
        'error-codes':
          description: "[1005]"

  /api/discussions/online:
    post:
      tags:
        - Discussion
      summary: 온라인 토론 생성
      description: 온라인(비대면) 토론을 생성합니다. 종료 날짜를 지정할 수 있습니다.
      operationId: createOnlineDiscussion
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/discussion.yaml#/components/schemas/OnlineDiscussionCreateRequest'
            example:
              title: "React vs Vue 비교"
              content: "프론트엔드 프레임워크 선택에 대해 토론합니다."
              endDate: "2025-12-01"
              category: "FRONTEND"
      responses:
        '201':
          description: 토론 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionCreateResponse'
              example:
                data:
                  discussionId: 789
        'error-codes':
          description: "[1005]"

  /api/discussions/offline/{id}:
    patch:
      tags:
        - Discussion
      summary: 오프라인 토론 수정
      description: 기존 오프라인 토론의 정보를 수정합니다.
      operationId: updateOfflineDiscussion
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/discussion.yaml#/components/schemas/OfflineDiscussionUpdateRequest'
            example:
              title: "백엔드 아키텍처 심화 토론"
              content: "마이크로서비스 아키텍처 패턴에 대해 심도있게 논의합니다."
              startAt: "2025-11-20T15:00:00"
              endAt: "2025-11-20T17:00:00"
              place: "역삼역 스터디룸"
              maxParticipantCount: 8
              category: "BACKEND"
      responses:
        '200':
          description: 토론 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5022, 5062]"

  /api/discussions/online/{id}:
    patch:
      tags:
        - Discussion
      summary: 온라인 토론 수정
      description: 기존 온라인 토론의 정보를 수정합니다.
      operationId: updateOnlineDiscussion
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/discussion.yaml#/components/schemas/OnlineDiscussionUpdateRequest'
            example:
              title: "React vs Vue 심화 비교"
              content: "상태 관리와 성능 최적화를 중심으로 비교합니다."
              endDate: "2025-12-15"
              category: "FRONTEND"
      responses:
        '200':
          description: 토론 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5022, 5062]"

  /api/discussions/{id}:
    get:
      tags:
        - Discussion
      summary: 토론 상세 조회
      description: 특정 토론의 상세 정보를 조회합니다.
      operationId: getDiscussionDetail
      parameters:
        - name: id
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 토론 상세 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionDetailResponse'
        'error-codes':
          description: "[5022]"

    delete:
      tags:
        - Discussion
      summary: 토론 삭제
      description: 특정 토론을 삭제합니다. 작성자만 삭제할 수 있습니다.
      operationId: deleteDiscussion
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 토론 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5022, 5062]"

  /api/discussions:
    get:
      tags:
        - Discussion
      summary: 토론 목록 조회
      description: |
        토론 목록을 조회합니다. 카테고리, 상태, 토론 타입으로 필터링할 수 있으며, 커서 기반 페이지네이션을 지원합니다.

        **필터 옵션:**
        - categories: 카테고리별 필터링 (복수 선택 가능)
        - statuses: 상태별 필터링 (복수 선택 가능)
        - discussionTypes: 토론 타입별 필터링 (복수 선택 가능)
      operationId: getDiscussions
      parameters:
        - name: categories
          in: query
          description: 카테고리 필터 (복수 선택 가능)
          required: false
          schema:
            type: array
            items:
              $ref: './components/schemas/discussion.yaml#/components/schemas/Category'
          style: form
          explode: true
        - name: statuses
          in: query
          description: 상태 필터 (복수 선택 가능)
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [recruiting, recruitComplete, inDiscussion, discussionComplete]
          style: form
          explode: true
        - name: discussionTypes
          in: query
          description: 토론 타입 필터 (복수 선택 가능)
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [ONLINE, OFFLINE]
          style: form
          explode: true
        - name: cursor
          in: query
          description: 페이지네이션 커서 (다음 페이지 조회 시 사용)
          required: false
          schema:
            type: string
        - name: size
          in: query
          description: 페이지 크기
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 토론 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionCursorPageResponse'
              example:
                data:
                  content:
                    - id: 1
                      title: "백엔드 아키텍처 토론"
                      status: "ACTIVE"
                      category: "BACKEND"
                      discussionType: "OFFLINE"
                      likeCount: 15
                      commentCount: 8
                      scrapCount: 5
                      viewCount: 120
                      createdAt: "2025-11-13T10:00:00"
                      author:
                        id: 123
                        nickname: "홍길동"
                        track: "BACKEND"
                      profileImage:
                        customImageUri: "https://s3.amazonaws.com/dialog/profiles/user123.jpg"
                        basicImageUri: "https://avatars.githubusercontent.com/u/12345"
                  nextCursor: "eyJpZCI6MSwiY3JlYXRlZEF0IjoiMjAyNS0xMS0xM1QxMDowMDowMCJ9"
                  hasNext: true
        'error-codes':
          description: "[]"

  /api/discussions/search:
    get:
      tags:
        - Discussion
      summary: 토론 검색
      description: |
        제목/내용 또는 작성자 닉네임으로 토론을 검색합니다.

        **검색 타입 (searchBy):**
        - 0: 제목 또는 내용으로 검색 (TITLE_OR_CONTENT)
        - 1: 작성자 닉네임으로 검색 (AUTHOR_NICKNAME)
      operationId: searchDiscussions
      parameters:
        - name: searchBy
          in: query
          required: true
          description: 검색 타입 (0=제목/내용, 1=작성자 닉네임)
          schema:
            type: integer
            enum: [0, 1]
        - name: query
          in: query
          required: true
          description: 검색 키워드
          schema:
            type: string
        - name: categories
          in: query
          description: 카테고리 필터 (복수 선택 가능)
          required: false
          schema:
            type: array
            items:
              $ref: './components/schemas/discussion.yaml#/components/schemas/Category'
          style: form
          explode: true
        - name: statuses
          in: query
          description: 상태 필터 (복수 선택 가능)
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [recruiting, recruitComplete, inDiscussion, discussionComplete]
          style: form
          explode: true
        - name: discussionTypes
          in: query
          description: 토론 타입 필터 (복수 선택 가능)
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [online, offline]
          style: form
          explode: true
        - name: cursor
          in: query
          description: 페이지네이션 커서, 첫 페이지는 null, 그 이후 페이지는 이전 페이지의 커서값 참조
          required: false
          schema:
            type: string
        - name: size
          in: query
          description: 페이지 크기
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 토론 검색 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionCursorPageResponse'
        'error-codes':
          description: "[]"

  /api/discussions/me:
    get:
      tags:
        - Discussion
      summary: 내가 작성한 토론 목록 조회
      description: 로그인한 사용자가 작성한 토론 목록을 조회합니다.
      operationId: getMyDiscussions
      security:
        - sessionAuth: []
      parameters:
        - name: cursor
          in: query
          description: 페이지네이션 커서
          required: false
          schema:
            type: string
        - name: size
          in: query
          description: 페이지 크기
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 내 토론 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionCursorPageResponse'
        'error-codes':
          description: "[1005]"

  /api/discussions/summary:
    post:
      tags:
        - Discussion
      summary: 토론 요약 생성
      description: AI를 사용하여 토론의 요약을 생성합니다.
      operationId: createDiscussionSummary
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionSummaryCreateRequest'
            example:
              discussionId: 123
      responses:
        '200':
          description: 요약 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionSummaryCreateResponse'
              example:
                data:
                  discussionId: 123
                  summary: "마이크로서비스와 모놀리식 아키텍처의 장단점에 대한 심도있는 토론이 진행되었습니다."
        'error-codes':
          description: "[1005, 5022]"

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'
