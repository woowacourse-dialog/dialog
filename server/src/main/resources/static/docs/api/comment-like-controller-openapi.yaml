openapi: 3.0.3
info:
  title: Dialog Comment Like API
  description: 댓글 좋아요 기능 관리를 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: Comment Like
    description: 댓글 좋아요 관리

paths:
  /api/discussions/comments/{commentId}/likes:
    post:
      tags:
        - Comment Like
      summary: 댓글 좋아요 추가
      description: 특정 댓글에 좋아요를 추가합니다.
      operationId: addCommentLike
      security:
        - sessionAuth: []
      parameters:
        - name: commentId
          in: path
          required: true
          description: 좋아요를 추가할 댓글 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 좋아요 추가 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5060, 5063]"

    delete:
      tags:
        - Comment Like
      summary: 댓글 좋아요 취소
      description: 특정 댓글의 좋아요를 취소합니다.
      operationId: removeCommentLike
      security:
        - sessionAuth: []
      parameters:
        - name: commentId
          in: path
          required: true
          description: 좋아요를 취소할 댓글 ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 좋아요 취소 성공 (응답 본문 없음)
        'error-codes':
          description: "[1005, 5060, 5064]"

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'
