openapi: 3.0.3
info:
  title: Auth Domain Schemas
  description: 인증 및 회원가입 도메인 스키마
  version: 1.0.0

components:
  schemas:
    SignupRequest:
      type: object
      required:
        - track
        - webPushNotification
      properties:
        track:
          $ref: './global.yaml#/components/schemas/Track'
        webPushNotification:
          type: boolean
          description: 웹 푸시 알림 수신 동의 여부
          example: true

    SignupResponse:
      type: object
      required:
        - userId
      properties:
        userId:
          type: integer
          format: int64
          description: 생성된 사용자의 ID
          example: 123

    LoginCheckResponse:
      type: object
      required:
        - isLoggedIn
      properties:
        isLoggedIn:
          type: boolean
          description: 로그인 여부
          example: true

    AppleLoginRequest:
      type: object
      required:
        - identityToken
        - nonce
      properties:
        identityToken:
          type: string
          description: Apple Sign In에서 발급받은 Identity Token (JWT)
          example: "eyJraWQiOiJXNldjT0..."
        nonce:
          type: string
          description: 클라이언트에서 생성한 nonce 값 (토큰 재사용 방지)
          example: "random-nonce-string"
        firstName:
          type: string
          nullable: true
          description: 사용자의 이름 (Apple 최초 로그인 시에만 제공)
          example: "길동"
        lastName:
          type: string
          nullable: true
          description: 사용자의 성 (Apple 최초 로그인 시에만 제공)
          example: "홍"

    OAuthLoginResponse:
      type: object
      required:
        - isRegistered
      properties:
        isRegistered:
          type: boolean
          description: 회원가입 완료 여부 (true → 기존 회원, false → 회원가입 필요)
          example: true
        userId:
          type: integer
          format: int64
          nullable: true
          description: 사용자 ID (가입된 사용자만 반환)
          example: 123
        nickname:
          type: string
          nullable: true
          description: 사용자 닉네임 (가입된 사용자만 반환)
          example: "홍길동"
