openapi: 3.0.3
info:
  title: Comment Domain Schemas
  description: 토론 댓글 도메인 스키마
  version: 1.0.0

components:
  schemas:
    DiscussionCommentCreateRequest:
      type: object
      required:
        - content
        - discussionId
      properties:
        content:
          type: string
          minLength: 1
          description: 댓글 내용 (필수, 공백 불가)
          example: "좋은 의견입니다!"
        discussionId:
          type: integer
          format: int64
          description: 댓글이 달릴 토론 ID (필수)
          example: 123
        parentDiscussionCommentId:
          type: integer
          format: int64
          nullable: true
          description: 부모 댓글 ID (대댓글인 경우에만 설정, 일반 댓글은 null)
          example: 456

    DiscussionCommentUpdateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          description: 수정할 댓글 내용 (필수, 공백 불가)
          example: "수정된 댓글 내용입니다."

    DiscussionCommentCreateResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          description: 생성된 댓글 ID
          example: 789

    DiscussionCommentListResponse:
      type: object
      required:
        - discussionComments
      properties:
        discussionComments:
          type: array
          items:
            $ref: '#/components/schemas/DiscussionCommentResponse'
          description: 댓글 목록 (최상위 댓글만 포함, 대댓글은 childComments에 포함)

    DiscussionCommentResponse:
      type: object
      required:
        - discussionCommentId
        - content
        - author
        - childComments
        - createdAt
        - modifiedAt
      properties:
        discussionCommentId:
          type: integer
          format: int64
          description: 댓글 ID
          example: 1
        content:
          type: string
          description: 댓글 내용
          example: "좋은 의견입니다!"
        author:
          $ref: '#/components/schemas/DiscussionComment_AuthorResponse'
        childComments:
          type: array
          items:
            $ref: '#/components/schemas/DiscussionCommentResponse'
          description: 대댓글 목록
        createdAt:
          type: string
          format: date-time
          description: 작성 일시
          example: "2025-11-13T10:30:00"
        modifiedAt:
          type: string
          format: date-time
          description: 수정 일시
          example: "2025-11-14T11:00:00"

    DiscussionComment_AuthorResponse:
      type: object
      required:
        - authorId
        - nickname
      properties:
        authorId:
          type: integer
          format: int64
          description: 작성자 ID
          example: 123
        nickname:
          type: string
          description: 작성자 닉네임
          example: "홍길동"
        profileImage:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DiscussionComment_ProfileImageResponse'

    DiscussionComment_ProfileImageResponse:
      type: object
      properties:
        basicImageUri:
          type: string
          nullable: true
          description: 기본 프로필 이미지 URL
          example: "https://avatars.githubusercontent.com/u/12345"
        customImageUri:
          type: string
          nullable: true
          description: 커스텀 프로필 이미지 URL
          example: "https://s3.amazonaws.com/dialog/profiles/user123.jpg"
