openapi: 3.0.3
info:
  title: Global Schemas
  description: 전역으로 공유되는 공통 스키마 정의
  version: 1.0.0

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: 에러 코드
          example: 4000
        message:
          type: string
          description: 에러 메시지
          example: "잘못된 요청입니다."

    AuthorResponse:
      type: object
      required:
        - id
        - nickname
        - track
      properties:
        id:
          type: integer
          format: int64
          description: 작성자 ID
          example: 123
        nickname:
          type: string
          description: 작성자 닉네임
          example: "홍길동"
        track:
          type: string
          enum: [BACKEND, FRONTEND, ANDROID]
          description: 작성자 트랙
          example: "BACKEND"

    ProfileImageResponse:
      type: object
      required:
        - customImageUri
        - basicImageUri
      properties:
        customImageUri:
          type: string
          nullable: true
          description: 커스텀 프로필 이미지 URL
          example: "https://s3.amazonaws.com/dialog/profiles/user123.jpg"
        basicImageUri:
          type: string
          nullable: true
          description: 기본 프로필 이미지 URL (GitHub)
          example: "https://avatars.githubusercontent.com/u/12345"

    Track:
      type: string
      description: 사용자의 개발 트랙
      enum:
        - BACKEND
        - FRONTEND
        - ANDROID
      example: "BACKEND"
