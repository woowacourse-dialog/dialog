openapi: 3.0.3
info:
  title: Scrap Domain Schemas
  description: 토론 북마크 도메인 스키마
  version: 1.0.0

components:
  schemas:
    ScrapStatusResponse:
      type: object
      required:
        - isScraped
      properties:
        isScraped:
          type: boolean
          description: 북마크 여부
          example: true

    ScrapCursorPageResponse:
      type: object
      required:
        - content
        - nextCursorId
        - hasNext
        - size
      properties:
        content:
          type: array
          items:
            $ref: './discussion.yaml#/components/schemas/DiscussionPreviewResponse'
          description: 북마크한 토론 목록
        nextCursorId:
          type: integer
          format: int64
          nullable: true
          description: 다음 페이지 커서 (토론 ID, 없으면 null)
          example: 78
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
          example: true
        size:
          type: integer
          description: 페이지 크기
          example: 10
