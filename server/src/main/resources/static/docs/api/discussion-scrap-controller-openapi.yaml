openapi: 3.0.3
info:
  title: Dialog Discussion Scrap API
  description: 토론 북마크(스크랩) 기능 관리를 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: Discussion Scrap
    description: 토론 북마크 관리

paths:
  /api/discussions/{discussionId}/scraps:
    post:
      tags:
        - Discussion Scrap
      summary: 북마크 추가
      description: 특정 토론을 북마크에 추가합니다. 이미 북마크가 되어있으면 중복되지 않습니다.
      operationId: addScrap
      security:
        - sessionAuth: []
      parameters:
        - name: discussionId
          in: path
          required: true
          description: 북마크할 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 북마크 추가 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/discussion.yaml#/components/schemas/DiscussionDetailResponse'
              example:
                data:
                  id: 1
                  discussionType: "OFFLINE"
                  commonDiscussionInfo:
                    title: "백엔드 아키텍처 토론"
                    content: "마이크로서비스 아키텍처에 대해 논의합니다."
                    summary: null
                    category: "backend"
                    createdAt: "2025-11-13T10:00:00"
                    modifiedAt: "2025-11-14T15:30:00"
                    likeCount: 15
                    author:
                      id: 123
                      name: "홍길동"
                      profileImage:
                        basicImageUri: "https://avatars.githubusercontent.com/u/12345"
                        customImageUri: null
                  offlineDiscussionInfo:
                    startAt: "2025-11-20 14:00"
                    endAt: "2025-11-20 16:00"
                    place: "강남역 스터디룸"
                    participantCount: 7
                    maxParticipantCount: 10
                    participants:
                      - id: 456
                        name: "김철수"
                  onlineDiscussionInfo: null
        'error-codes':
          description: "[1005, 5022]"

    delete:
      tags:
        - Discussion Scrap
      summary: 북마크 제거
      description: 특정 토론을 북마크에서 제거합니다.
      operationId: removeScrap
      security:
        - sessionAuth: []
      parameters:
        - name: discussionId
          in: path
          required: true
          description: 북마크 제거할 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 북마크 제거 성공 (응답 본문 없음)
        'error-codes':
          description: "[1005, 5022]"

  /api/discussions/{discussionId}/scraps/status:
    get:
      tags:
        - Discussion Scrap
      summary: 북마크 상태 조회
      description: 현재 사용자가 해당 토론을 북마크했는지 확인합니다.
      operationId: getScrapStatus
      security:
        - sessionAuth: []
      parameters:
        - name: discussionId
          in: path
          required: true
          description: 토론 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 북마크 상태 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/scrap.yaml#/components/schemas/ScrapStatusResponse'
              examples:
                scraped:
                  summary: 북마크에 추가된 상태
                  value:
                    data:
                      isScraped: true
                notScraped:
                  summary: 북마크에 추가되지 않은 상태
                  value:
                    data:
                      isScraped: false
        'error-codes':
          description: "[1005, 5022]"

  /api/scraps/me:
    get:
      tags:
        - Discussion Scrap
      summary: 내 북마크 목록 조회
      description: |
        로그인한 사용자가 북마크한 토론 목록을 조회합니다.

        **페이지네이션:**
        - 커서 기반 페이지네이션 사용
        - 커서는 스크랩 ID (Long) 사용
        - 기본 페이지 크기: 10
      operationId: getMyScrapsList
      security:
        - sessionAuth: []
      parameters:
        - name: lastCursorId
          in: query
          required: false
          description: 마지막으로 조회한 스크랩 ID (다음 페이지 조회 시 사용)
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          description: 페이지 크기
          schema:
            type: integer
            default: 10
            example: 10
      responses:
        '200':
          description: 북마크 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/scrap.yaml#/components/schemas/ScrapCursorPageResponse'
              example:
                data:
                  content:
                    - id: 123
                      discussionType: "OFFLINE"
                      commonDiscussionInfo:
                        title: "백엔드 아키텍처 토론"
                        author: "홍길동"
                        profileImage:
                          customImageUri: "https://s3.amazonaws.com/dialog/profiles/user456.jpg"
                          basicImageUri: "https://avatars.githubusercontent.com/u/12345"
                        category: "backend"
                        createdAt: "2025-11-13T10:00:00"
                        modifiedAt: "2025-11-14T15:30:00"
                        commentCount: 8
                      offlineDiscussionInfo:
                        startAt: "2025-11-20 14:00"
                        endAt: "2025-11-20 16:00"
                        place: "강남역 스터디룸"
                        participantCount: 7
                        maxParticipantCount: 10
                      onlineDiscussionInfo: null
                  nextCursorId: 78
                  hasNext: true
                  size: 10
        'error-codes':
          description: "[1005]"

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'
