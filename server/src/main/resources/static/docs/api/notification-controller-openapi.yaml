openapi: 3.0.3
info:
  title: Dialog Notification API
  description: 알림 조회 및 관리를 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: Notification
    description: 알림 관리

paths:
  /api/notifications/polling:
    get:
      tags:
        - Notification
      summary: 알림 폴링 조회
      description: |
        Long Polling 방식으로 새로운 알림을 조회합니다.

        **동작 방식:**
        - 새로운 알림이 있으면 즉시 반환
        - 새로운 알림이 없으면 최대 30초 대기
        - 30초 내에 알림이 없으면 타임아웃 응답 반환
        - sessionId를 통해 클라이언트 세션 관리
        - lastNotificationId 이후의 알림만 조회
      operationId: getPollingNotifications
      security:
        - sessionAuth: []
      parameters:
        - name: lastNotificationId
          in: query
          description: 마지막으로 받은 알림 ID (이후의 알림만 조회)
          required: false
          schema:
            type: integer
            format: int64
          example: 100
        - name: sessionId
          in: query
          description: 클라이언트 세션 ID (폴링 세션 관리용)
          required: true
          schema:
            type: string
          example: "session-abc123"
      responses:
        '200':
          description: 알림 조회 성공 (새 알림 있음 또는 타임아웃)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/notification.yaml#/components/schemas/NotificationPollingResponse'
              examples:
                newNotification:
                  summary: 새로운 알림이 있는 경우
                  value:
                    data:
                      status: "NEW_NOTIFICATION"
                      notifications:
                        - id: 101
                          senderId: 456
                          senderNickname: "홍길동"
                          message: "홍길동님이 토론에 의견을 남겼습니다."
                          type: "DISCUSSION_COMMENT"
                          routeParams:
                            type: "DISCUSSION_COMMENT"
                            discussionId: 10
                            commentId: 20
                          createdAt: "2025-12-21T14:30:00"
                          isRead: false
                      unreadCount: 5
                timeout:
                  summary: 타임아웃 발생 (새 알림 없음)
                  value:
                    data:
                      status: "TIMEOUT"
                      notifications: []
                      unreadCount: 4
        'error-codes':
          description: "[1005, 5031]"

  /api/notifications/me:
    get:
      tags:
        - Notification
      summary: 알림 목록 조회
      description: |
        페이지네이션을 지원하는 사용자의 알림 목록을 조회합니다.

        **기본값:**
        - page: 0 (첫 페이지)
        - size: 20 (페이지당 20개)
        - 최대 size: 50
      operationId: getNotificationPage
      security:
        - sessionAuth: []
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (0부터 시작)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
        - name: size
          in: query
          description: 페이지 크기 (1~50)
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          example: 20
      responses:
        '200':
          description: 알림 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/notification.yaml#/components/schemas/NotificationPageResponse'
              example:
                data:
                  notifications:
                    - id: 123
                      senderId: 456
                      senderNickname: "홍길동"
                      message: "홍길동님이 토론에 의견을 남겼습니다."
                      type: "DISCUSSION_COMMENT"
                      routeParams:
                        type: "DISCUSSION_COMMENT"
                        discussionId: 10
                        commentId: 20
                      createdAt: "2025-12-21T14:30:00"
                      isRead: false
                    - id: 122
                      senderId: 789
                      senderNickname: "김철수"
                      message: "김철수님이 의견에 답글을 남겼습니다."
                      type: "COMMENT_REPLY"
                      routeParams:
                        type: "COMMENT_REPLY"
                        discussionId: 10
                        parentCommentId: 20
                        childCommentId: 30
                      createdAt: "2025-12-21T13:00:00"
                      isRead: true
                  unreadCount: 5
                  currentPage: 0
                  pageSize: 20
                  totalElements: 100
                  totalPages: 5
        'error-codes':
          description: "[1005, 5031]"

  /api/notifications/{notificationId}:
    patch:
      tags:
        - Notification
      summary: 특정 알림 읽음 처리
      description: 특정 알림을 읽음 상태로 변경합니다.
      operationId: updateNotificationAsRead
      security:
        - sessionAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          description: 알림 ID
          schema:
            type: integer
            format: int64
          example: 123
      responses:
        '200':
          description: 알림 읽음 처리 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5031, 5090]"

  /api/notifications/all:
    patch:
      tags:
        - Notification
      summary: 모든 알림 읽음 처리
      description: 사용자의 모든 읽지 않은 알림을 읽음 상태로 변경합니다.
      operationId: updateAllNotificationAsRead
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 모든 알림 읽음 처리 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5031]"

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'