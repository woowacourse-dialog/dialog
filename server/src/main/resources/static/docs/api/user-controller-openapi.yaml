openapi: 3.0.3
info:
  title: Dialog User API
  description: 사용자 정보 및 프로필 관리를 위한 API
  version: 1.0.0
  contact:
    name: Dialog Team

servers:
  - url: https://api.dialog.com
    description: 프로덕션 서버

tags:
  - name: User
    description: 사용자 프로필 관리

paths:
  /api/user/mine:
    get:
      tags:
        - User
      summary: 사용자 정보 조회
      description: 인증된 사용자의 정보를 조회합니다.
      operationId: getUserInfo
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 사용자 정보 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/user.yaml#/components/schemas/UserInfoResponse'
              example:
                data:
                  id: 123
                  nickname: "홍길동"
                  githubId: "gildong123"
                  track: "BACKEND"
                  isNotificationEnabled: true
        'error-codes':
          description: "[1005, 5031]"

    patch:
      tags:
        - User
      summary: 사용자 프로필 수정
      description: 사용자의 닉네임과 트랙 정보를 수정합니다.
      operationId: updateUserProfile
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/user.yaml#/components/schemas/UserMypageUpdateRequest'
            example:
              nickname: "새로운닉네임"
              track: "FRONTEND"
      responses:
        '200':
          description: 사용자 프로필 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5031]"

    delete:
      tags:
        - User
      summary: 회원 탈퇴
      description: 사용자 계정을 탈퇴 처리합니다. deletedAt 필드에 현재 시각이 기록되며, 세션과 쿠키가 삭제됩니다.
      operationId: deleteUser
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 회원 탈퇴 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
              example:
                data: null
        'error-codes':
          description: "[1005, 5031]"

  /api/user/mine/notifications:
    patch:
      tags:
        - User
      summary: 알림 설정 변경
      description: 사용자의 알림 수신 설정을 변경합니다.
      operationId: updateNotificationSettings
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/user.yaml#/components/schemas/NotificationSettingRequest'
            example:
              isNotificationEnable: true
      responses:
        '200':
          description: 알림 설정 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/user.yaml#/components/schemas/NotificationSettingResponse'
              example:
                data:
                  isNotificationEnable: true
        'error-codes':
          description: "[1005, 5031]"

  /api/user/mine/profile-image:
    get:
      tags:
        - User
      summary: 프로필 이미지 조회
      description: 사용자의 프로필 이미지 URL을 조회합니다. 커스텀 이미지와 기본 이미지(GitHub) URL을 모두 반환합니다.
      operationId: getProfileImage
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 프로필 이미지 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/user.yaml#/components/schemas/ProfileImageGetResponse'
              example:
                data:
                  customImageUri: "https://s3.amazonaws.com/dialog/profiles/user123.jpg"
                  basicImageUri: "https://avatars.githubusercontent.com/u/12345"
        'error-codes':
          description: "[1005, 5031]"

    patch:
      tags:
        - User
      summary: 프로필 이미지 업로드
      description: 사용자의 프로필 이미지를 업로드하고 S3에 저장합니다.
      operationId: updateProfileImage
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 업로드할 이미지 파일 (JPEG, PNG 등)
      responses:
        '200':
          description: 프로필 이미지 업로드 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/user.yaml#/components/schemas/ProfileImageUpdateResponse'
              example:
                data:
                  customImageUri: "https://s3.amazonaws.com/dialog/profiles/user123-new.jpg"
                  basicImageUri: "https://avatars.githubusercontent.com/u/12345"
        'error-codes':
          description: "[1005, 5031]"

  /api/user/mine/track:
    get:
      tags:
        - User
      summary: 사용자 트랙 조회
      description: 사용자의 트랙 정보를 조회합니다.
      operationId: getUserTrack
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 사용자 트랙 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: './components/schemas/user.yaml#/components/schemas/MyTrackGetTrackResponse'
              example:
                data:
                  track: "BACKEND"
        'error-codes':
          description: "[1005, 5031]"

components:
  securitySchemes:
    sessionAuth:
      $ref: './components/security/schemes.yaml#/components/securitySchemes/sessionAuth'
